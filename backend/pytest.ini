[pytest]
# pytest configuration for Gemma Health Edge

# Test discovery patterns
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio configuration
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Coverage configuration
addopts =
    -v
    --tb=short

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning

# Environment variables for testing
env =
    GHE_DEBUG=true
    GHE_LOG_LEVEL=DEBUG
    GHE_RATE_LIMIT=1000/minute
