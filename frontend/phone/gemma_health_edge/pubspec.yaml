name: gemma_health_edge
description: Offline multimodal health assistant powered by Gemma 4
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^10.0.0
  crypto: ^3.0.3
  encrypt: ^5.0.3

  # Networking
  http: ^1.2.1

  # Media
  image_picker: ^1.2.2
  permission_handler: ^12.0.1

  # Voice
  speech_to_text: ^7.3.0
  flutter_tts: ^4.0.2

  # UI
  flutter_markdown_plus: ^1.0.7
  flutter_colorpicker: ^1.1.0
  google_fonts: ^8.1.0

  # Utilities
  connectivity_plus: ^7.1.1
  intl: ^0.20.2
  csv: ^8.0.0

  # FFI for llama.cpp bindings
  ffi: ^2.1.2
  
  # llama.cpp Python library for Flutter integration
  llama_cpp_dart: ^0.1.0

  # LiteRT (TensorFlow Lite) for on-device ML
  tflite_flutter: ^0.12.1

  # Image processing for LiteRT
  image: ^4.2.0

  # Health (HealthKit on iOS, Health Connect on Android)
  health: ^13.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/logo.png
    - assets/datasets/
